<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Flight</title>
</head>
<body>
<h1>New Flight</h1>
<form th:action="@{/flights}" th:object="${flight}" method="post">
    <label for="flightNumber">Flight Number:</label>
    <input type="text" id="flightNumber" name="flightNumber" th:field="*{flightNumber}"/><br/>

    <label for="destination">Destination:</label>
    <input type="text" id="destination" name="destination" th:field="*{destination}"/><br/>

    <label for="departureTime">Departure Time:</label>
    <input type="datetime-local" id="departureTime" name="departureTime" th:field="*{departureTime}"/><br/>

    <label for="price">Price:</label>
    <input type="number" id="price" name="price" step="0.01" th:field="*{price}"/><br/>

    <button type="submit">Save</button>
</form>
<a href="/flights">Back to Flights</a>
</body>
</html>
