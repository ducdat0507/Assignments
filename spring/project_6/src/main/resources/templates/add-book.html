<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Book</title>
</head>
<body>
<h1>Add New Book</h1>
<form th:action="@{/books}" th:object="${book}" method="post">
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" th:field="*{title}"/>
    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

    <label for="author">Author:</label>
    <input type="text" id="author" name="author" th:field="*{author}"/>
    <div th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>

    <label for="publishedYear">Published Year:</label>
    <input type="number" id="publishedYear" name="publishedYear" th:field="*{publishedYear}"/>
    <div th:if="${#fields.hasErrors('publishedYear')}" th:errors="*{publishedYear}"></div>

    <label for="copiesAvailable">Copies Available:</label>
    <input type="number" id="copiesAvailable" name="copiesAvailable" th:field="*{copiesAvailable}"/>
    <div th:if="${#fields.hasErrors('copiesAvailable')}" th:errors="*{copiesAvailable}"></div>

    <button type="submit">Add Book</button>
</form>
</body>
</html>
