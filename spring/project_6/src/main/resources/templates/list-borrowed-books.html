<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Borrowed Books List</title>
</head>
<body>
<h1>Borrowed Books List</h1>
<table border="1">
    <thead>
    <tr>
        <th>Borrower</th>
        <th>Book Title</th>
        <th>Borrow Date</th>
        <th>Return Date</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="borrowedBook : ${borrowedBooks}">
        <td th:text="${borrowedBook.borrower.name}"></td>
        <td th:text="${borrowedBook.book.title}"></td>
        <td th:text="${borrowedBook.borrowDate}"></td>
        <td th:text="${borrowedBook.returnDate}"></td>
        <td>
            <form th:action="@{/return}" method="post">
                <input type="hidden" name="id" th:value="${borrowedBook.id}"/>
                <button type="submit">Mark as Returned</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
