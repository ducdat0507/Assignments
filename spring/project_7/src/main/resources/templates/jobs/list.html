<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Available Job Listings</title>
</head>
<body>
<h2>Available Job Listings</h2>
<a th:href="@{/jobs/add}">Add New Job</a>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Company</th>
        <th>Location</th>
        <th>Salary</th>
        <th>Posted Date</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="job : ${jobs}">
        <td th:text="${job.id}"></td>
        <td th:text="${job.title}"></td>
        <td th:text="${job.company}"></td>
        <td th:text="${job.location}"></td>
        <td th:text="${job.salary}"></td>
        <td th:text="${job.postedDate}"></td>
        <td>
            <a th:href="@{/applications/job/{id}(id=${job.id})}">View Applications</a>
            |
            <a th:href="@{/applications/apply(jobId=${job.id})}">Apply</a>
            |
            <a th:href="@{/jobs/delete/{id}(id=${job.id})}" onclick="return confirm('Delete this job?');">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
